<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MES | Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           Premium Dark UI - Design System
        ========================================= */
        :root {
            /* الألوان الأساسية مستوحاة من الصور */
            --bg-base: #121214;
            --surface-1: rgba(28, 28, 32, 0.6);
            --surface-2: rgba(40, 40, 45, 0.5);
            --glass-border: rgba(255, 255, 255, 0.05);
            
            /* ألوان النيون المضيئة */
            --accent-orange: #FF5722;
            --accent-orange-glow: rgba(255, 87, 34, 0.4);
            --accent-cyan: #00E5FF;
            --accent-cyan-glow: rgba(0, 229, 255, 0.3);
            --accent-purple: #8A2BE2;
            
            /* النصوص */
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-placeholder: #5c5c62;
            
            /* الأبعاد والزوايا (Curves) */
            --radius-xl: 32px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --nav-height: 85px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            overflow-x: hidden; 
            padding-bottom: calc(var(--nav-height) + 30px); 
            /* إضاءة محيطية (Ambient Glow) كالتي في الصور */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 87, 34, 0.08), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 229, 255, 0.08), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.05), transparent 50%);
            background-attachment: fixed;
        }

        .eng-font { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 1.5px; }
        
        /* تأثير الزجاج الفخم */
        .glass-card { 
            background: var(--surface-1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-xl);
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        /* رأس التطبيق */
        .app-header { 
            position: sticky; top: 0; z-index: 100; 
            padding: 20px 25px; 
            background: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            border-bottom-left-radius: var(--radius-xl); 
            border-bottom-right-radius: var(--radius-xl); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .dept-title { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; color: var(--text-primary); }
        .dept-title i { color: var(--accent-orange); font-size: 1.4rem; filter: drop-shadow(0 0 8px var(--accent-orange-glow)); }
        
        .icon-btn { 
            background: var(--surface-2); border: 1px solid var(--glass-border); 
            border-radius: 50%; color: var(--text-main); font-size: 1.1rem; 
            cursor: pointer; width: 45px; height: 45px; display: flex; 
            justify-content: center; align-items: center; transition: 0.3s; 
        }
        .icon-btn:active { transform: scale(0.9); background: var(--accent-orange); border-color: var(--accent-orange); color: #fff;}

        .content-area { padding: 20px; }
        .screen { display: none; animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .screen.active { display: block; }
        @keyframes scaleUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* البطاقة الرئيسية (Hero) */
        .hero-card h2 { font-size: 0.95rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .hero-number { 
            font-size: 4.5rem; 
            background: linear-gradient(180deg, #ffffff 0%, #7e7e86 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            line-height: 1.1; margin: 5px 0; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        /* شبكة الأزرار */
        .section-title { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; font-weight: 800; }
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-card { 
            background: var(--surface-2); border: 1px solid var(--glass-border); 
            border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; 
            align-items: center; gap: 12px; color: var(--text-primary); cursor: pointer; transition: 0.3s; 
        }
        .action-card:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
        .action-icon { font-size: 2.2rem; margin-bottom: 5px; }
        .action-icon.accent-o { color: var(--accent-orange); filter: drop-shadow(0 0 10px var(--accent-orange-glow)); }
        .action-icon.accent-c { color: var(--accent-cyan); filter: drop-shadow(0 0 10px var(--accent-cyan-glow)); }
        .action-card span { font-weight: 800; font-size: 0.9rem; }

        /* المدخلات والنماذج */
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; padding-right: 5px;}
        .glass-input { 
            width: 100%; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); padding: 16px 18px; 
            border-radius: var(--radius-md); color: var(--text-primary); 
            font-family: 'Cairo'; font-size: 1rem; outline: none; transition: 0.3s; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .glass-input::placeholder { color: var(--text-placeholder); }
        .glass-input:focus { border-color: var(--accent-orange); background: rgba(255, 87, 34, 0.05); }
        
        .glass-btn { 
            width: 100%; 
            background: linear-gradient(135deg, var(--accent-orange), #ff2a00); 
            color: #fff; border: none; padding: 18px; border-radius: var(--radius-lg); 
            font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 10px; 
            transition: 0.3s; font-family: 'Cairo'; 
            box-shadow: 0 8px 25px var(--accent-orange-glow);
        }
        .glass-btn:active { transform: scale(0.97); box-shadow: 0 4px 15px var(--accent-orange-glow); }
        .glass-btn.secondary { background: var(--surface-2); color: var(--text-primary); box-shadow: none; border: 1px solid var(--glass-border); }

        /* قائمة الإنتاج - تصميم دقيق */
        .prod-header { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .prod-row-container { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            padding: 15px; border-radius: var(--radius-lg); margin-bottom: 12px; 
            transition: 0.3s;
        }
        .prod-row-container:focus-within { border-color: rgba(255, 255, 255, 0.15); background: rgba(255,255,255,0.02); }
        .prod-row-flex { display: flex; justify-content: space-between; align-items: center; }
        .prod-row.break-row { background: rgba(255, 87, 34, 0.1); border: 1px solid rgba(255, 87, 34, 0.2); justify-content: center; color: var(--accent-orange); font-weight: 800; padding: 15px; border-radius: var(--radius-lg); margin-bottom: 12px; text-align: center; }
        
        .time-label { font-family: 'Orbitron'; color: var(--text-primary); font-weight: 700; font-size: 1.15rem; }
        .actual-input { 
            width: 85px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: var(--accent-cyan); font-family: 'Orbitron'; 
            font-size: 1.3rem; text-align: center; padding: 10px; outline: none; transition: 0.3s;
        }
        .actual-input:focus { border-color: var(--accent-cyan); background: rgba(0, 229, 255, 0.05); }
        
        /* حقل العجز مدمج بشكل أنيق ومخفي قليلاً (Neumorphic inset) */
        .reason-input { 
            width: 100%; background: transparent; border: none; border-top: 1px dashed var(--glass-border);
            padding: 12px 5px 0 5px; color: var(--text-muted); font-family: 'Cairo'; font-size: 0.85rem; 
            margin-top: 12px; outline: none; transition: 0.3s;
        }
        .reason-input:focus { color: var(--text-primary); border-top-color: var(--accent-orange); }
        .reason-input::placeholder { color: var(--text-placeholder); font-style: italic; }

        /* شريط التنقل العائم (Floating Nav) */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 5%; right: 5%; width: 90%; height: var(--nav-height); 
            background: rgba(25, 25, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); padding: 0 10px;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; gap: 6px; 
            color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; 
            transition: 0.3s; cursor: pointer; width: 60px;
        }
        .nav-item i { font-size: 1.3rem; transition: 0.3s; }
        .nav-item.active { color: var(--text-primary); }
        .nav-item.active i { transform: translateY(-4px); color: var(--accent-orange); filter: drop-shadow(0 0 10px var(--accent-orange-glow)); }
        
        /* زر الواتساب المركزي */
        .special-nav .fab-btn { 
            width: 65px; height: 65px; background: linear-gradient(135deg, #25D366, #128C7E); 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            color: white; font-size: 2rem; margin-top: -45px; 
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); 
            border: 5px solid var(--bg-base); cursor: pointer; transition: 0.3s; 
        }
        .special-nav .fab-btn:active { transform: scale(0.9); }

        /* Toast */
        #toast { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px); 
            background: rgba(255, 255, 255, 0.95); color: #000; padding: 12px 25px; 
            border-radius: 30px; font-weight: 800; z-index: 2000; opacity: 0; 
            pointer-events: none; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); font-size: 0.9rem;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="dept-title">
            <i class="fa-solid fa-microchip"></i>
            <span>التجميع النهائي والتغليف</span>
        </div>
        <button class="icon-btn" onclick="App.navigate('settings')"><i class="fa-solid fa-sliders"></i></button>
    </header>

    <main class="content-area">
        
        <!-- ================= الشاشة الرئيسية ================= -->
        <section id="screen-home" class="screen active">
            <div class="glass-card hero-card">
                <h2>إجمالي إنتاج اليوم</h2>
                <div class="hero-number eng-font" id="home-total-prod">0</div>
            </div>
            
            <h3 class="section-title">العمليات السريعة</h3>
            <div class="grid-actions">
                <div class="action-card" onclick="App.navigate('production')">
                    <i class="fa-solid fa-stopwatch action-icon accent-o"></i>
                    <span>سجل الساعات</span>
                </div>
                <div class="action-card" onclick="App.navigate('scratches')">
                    <i class="fa-solid fa-spray-can action-icon accent-c"></i>
                    <span>عيوب الرش</span>
                </div>
                <div class="action-card" onclick="App.syncToCloud()">
                    <i class="fa-solid fa-cloud-arrow-up action-icon accent-o" style="color: #a0a0a5;"></i>
                    <span style="color: #a0a0a5;">حفظ للسحابة</span>
                </div>
                <div class="action-card" onclick="App.fetchFromCloud()">
                    <i class="fa-solid fa-cloud-arrow-down action-icon accent-c" style="color: #a0a0a5;"></i>
                    <span style="color: #a0a0a5;">استرداد البيانات</span>
                </div>
            </div>
        </section>

        <!-- ================= شاشة الإنتاج ================= -->
        <section id="screen-production" class="screen">
            <h3 class="section-title">سجل الإنتاج اللحظي</h3>
            
            <div class="prod-header">
                <div class="input-group" style="margin-bottom: 0;">
                    <label>التقويم</label>
                    <input type="date" id="prod-date" class="glass-input" onchange="App.changeDay()">
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <label>الوردية</label>
                    <select id="prod-shift" class="glass-input" onchange="App.changeDay()">
                        <option value="1">الوردية الأولى (1)</option>
                        <option value="2">الوردية الثانية (2)</option>
                        <option value="3">الوردية الثالثة (3)</option>
                    </select>
                </div>
                <div class="input-group" style="grid-column: 1 / -1; margin-bottom: 5px;">
                    <label>المستهدف اليومي</label>
                    <input type="number" id="prod-target" class="glass-input eng-font" placeholder="أدخل المستهدف..." oninput="App.saveState()">
                </div>
            </div>

            <div class="glass-card" style="padding: 15px;">
                <div id="production-list"></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
                    <span style="color: var(--text-secondary); font-weight: 800; font-size: 1rem;">إجمالي الإنتاج: </span>
                    <span id="prod-total-calc" class="eng-font" style="font-size: 1.8rem; color: var(--accent-orange); filter: drop-shadow(0 0 5px var(--accent-orange-glow));">0</span>
                </div>
            </div>
        </section>

        <!-- ================= شاشة عيوب الرش ================= -->
        <section id="screen-scratches" class="screen">
            <h3 class="section-title">سجل عيوب الرش الظاهرية</h3>
            
            <div class="glass-card" style="padding: 20px;">
                <div class="input-group">
                    <label>نوع العيب</label>
                    <select id="scratch-type" class="glass-input">
                        <option value="خدش خفيف">خدش خفيف</option>
                        <option value="خدش عميق">خدش عميق</option>
                        <option value="خبطة">خبطة</option>
                        <option value="تسييل لون">تسييل لون</option>
                        <option value="رايش">رايش</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>صورة العيب</label>
                    <input type="file" id="scratch-image" accept="image/*" capture="environment" class="glass-input" style="padding: 12px; color: var(--accent-cyan);">
                </div>
                <div class="input-group">
                    <label>ملاحظات</label>
                    <input type="text" id="scratch-notes" class="glass-input" placeholder="مثال: يمين الباب السفلي...">
                </div>
                <button class="glass-btn" onclick="App.addScratchDefect()">إدراج في السجل</button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding: 0 10px;">
                <h4 style="color:var(--text-secondary); font-size: 0.9rem;">العيوب المسجلة</h4>
                <span class="eng-font" id="scratches-counter" style="color:var(--text-primary); font-size:1.1rem; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 10px;">0</span>
            </div>
            <div id="scratches-list"></div>
        </section>

        <!-- ================= شاشة الإعدادات ================= -->
        <section id="screen-settings" class="screen">
            <h3 class="section-title">إعدادات الوردية والخط</h3>
            <div class="glass-card">
                <div class="input-group"><label>بداية الوردية</label><input type="time" id="set-shift-start" class="glass-input" value="07:30"></div>
                <div class="input-group"><label>نهاية الوردية</label><input type="time" id="set-shift-end" class="glass-input" value="16:00"></div>
                <div class="input-group"><label>بداية الراحة</label><input type="time" id="set-break-start" class="glass-input" value="12:30"></div>
                <div class="input-group"><label>نهاية الراحة</label><input type="time" id="set-break-end" class="glass-input" value="13:30"></div>
                <div class="input-group" style="margin-top: 25px;"><label>اسم الخط</label><input type="text" id="set-line-name" class="glass-input" value="الثلاجة A | Final Assembly"></div>
                
                <button class="glass-btn" onclick="App.applySettings()">اعتماد الإعدادات</button>
                <button class="glass-btn secondary" style="margin-top: 15px; color: var(--accent-orange); border-color: rgba(255, 87, 34, 0.3);" onclick="App.hardReset()">مسح الذاكرة بالكامل</button>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-target="home" onclick="App.navigate('home')">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" data-target="production" onclick="App.navigate('production')">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>الإنتاج</span>
        </div>
        <div class="nav-item special-nav" onclick="App.sendWhatsAppReport()">
            <div class="fab-btn"><i class="fa-brands fa-whatsapp"></i></div>
        </div>
        <div class="nav-item" data-target="scratches" onclick="App.navigate('scratches')">
            <i class="fa-solid fa-spray-can"></i>
            <span>الرش</span>
        </div>
        <div class="nav-item" data-target="analytics" onclick="App.navigate('analytics')">
            <i class="fa-solid fa-chart-pie"></i>
            <span>التحليل</span>
        </div>
    </nav>

    <div id="toast">رسالة تنبيه</div>

    <script>
        const App = {
            // ==========================================
            GOOGLE_API_URL: 'https://script.google.com/macros/s/AKfycbwHY23p34VnHGXVzbfqe6KgMkHWyZouu3VIoLtbkbtetnFYGpI7QRoGRmI0sJ3DNQND/exec', 
            // ==========================================

            syncTimer: null, 

            data: {
                settings: { start: '07:30', end: '16:00', bStart: '12:30', bEnd: '14:30', lineName: 'الثلاجة A | Final Assembly' },
                production: { date: '', shift: '1', target: '', items: [] },
                history: {}, 
                scratches: []
            },

            init() {
                try {
                    const saved = localStorage.getItem('mes_core_data');
                    if (saved) {
                        const parsedData = JSON.parse(saved);
                        if (parsedData.settings) this.data.settings = { ...this.data.settings, ...parsedData.settings };
                        if (parsedData.production) this.data.production = { ...this.data.production, ...parsedData.production };
                        if (!this.data.production.items) this.data.production.items = [];
                        if (parsedData.history) this.data.history = parsedData.history;
                        if (parsedData.scratches) this.data.scratches = parsedData.scratches;
                    } else {
                        let today = new Date();
                        this.data.production.date = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                    }
                } catch(e) {
                    console.error("Cache Reset", e);
                    localStorage.removeItem('mes_core_data');
                    let today = new Date();
                    this.data.production.date = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                }

                if (!this.data.history) this.data.history = {};
                if (this.data.production.target === undefined) this.data.production.target = '';

                document.getElementById('set-shift-start').value = this.data.settings.start;
                document.getElementById('set-shift-end').value = this.data.settings.end;
                document.getElementById('set-break-start').value = this.data.settings.bStart;
                document.getElementById('set-break-end').value = this.data.settings.bEnd;
                document.getElementById('set-line-name').value = this.data.settings.lineName;
                
                this.updateProductionUI();

                if (this.data.production.items.length === 0) {
                    this.generateIntervals();
                }

                this.renderScratchesList();
                this.fetchFromCloud(true);

                document.addEventListener("visibilitychange", () => {
                    if (document.visibilityState === "visible") {
                        this.fetchFromCloud(true);
                    }
                });
            },

            changeDay() {
                const currentKey = `${this.data.production.date}_${this.data.production.shift}`;
                this.data.history[currentKey] = JSON.parse(JSON.stringify(this.data.production));

                const newDate = document.getElementById('prod-date').value;
                const newShift = document.getElementById('prod-shift').value;
                const newKey = `${newDate}_${newShift}`;

                if (this.data.history[newKey]) {
                    this.data.production = JSON.parse(JSON.stringify(this.data.history[newKey]));
                    this.updateProductionUI();
                    this.showToast("تم استدعاء السجل 📅");
                    this.saveState(true); 
                } else {
                    this.data.production = { date: newDate, shift: newShift, target: '', items: [] };
                    this.generateIntervals(); 
                }
            },

            updateProductionUI() {
                document.getElementById('prod-date').value = this.data.production.date;
                document.getElementById('prod-shift').value = this.data.production.shift;
                document.getElementById('prod-target').value = this.data.production.target || '';
                this.renderProductionList();
            },

            hardReset() {
                if(confirm("مسح جميع بيانات التطبيق والعودة لضبط المصنع؟")) {
                    localStorage.removeItem('mes_core_data');
                    location.reload();
                }
            },

            navigate(screenId) {
                if(screenId === 'analytics') { this.showToast("شاشة التحليلات قريباً"); return; }
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                const targetScreen = document.getElementById('screen-' + screenId);
                if(targetScreen) targetScreen.classList.add('active');

                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navBtn = document.querySelector(`.nav-item[data-target="${screenId}"]`);
                if(navBtn) navBtn.classList.add('active');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            formatAMPM(timeStr) {
                let [hours, minutes] = timeStr.split(':');
                hours = parseInt(hours);
                let ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12; hours = hours ? hours : 12; 
                let hoursStr = hours < 10 ? '0' + hours : hours;
                return `${hoursStr}:${minutes} ${ampm}`;
            },

            addMinutes(timeStr, minsToAdd) {
                let [h, m] = timeStr.split(':').map(Number);
                let date = new Date(); date.setHours(h, m, 0);
                date.setMinutes(date.getMinutes() + minsToAdd);
                return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            },

            timeToMins(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; },

            generateIntervals() {
                const { start, end, bStart, bEnd } = this.data.settings;
                let current = start; let intervals = [];
                let endMins = this.timeToMins(end);
                if (endMins <= this.timeToMins(start)) endMins += 24 * 60;

                while (this.timeToMins(current) < endMins) {
                    if (current === bStart) { intervals.push({ isBreak: true, label: "فترة راحة" }); current = bEnd; continue; }
                    let nextHour = this.addMinutes(current, 60);
                    if (this.timeToMins(nextHour) > this.timeToMins(bStart) && this.timeToMins(current) < this.timeToMins(bStart)) nextHour = bStart;
                    if (this.timeToMins(nextHour) > endMins) nextHour = end;
                    
                    intervals.push({ isBreak: false, label: this.formatAMPM(nextHour), rawTime: nextHour, actual: "", shortfallReason: "" });
                    current = nextHour;
                }

                this.data.production.items = intervals;
                this.saveState(); 
                this.updateProductionUI();
            },

            applySettings() {
                this.data.settings.start = document.getElementById('set-shift-start').value;
                this.data.settings.end = document.getElementById('set-shift-end').value;
                this.data.settings.bStart = document.getElementById('set-break-start').value;
                this.data.settings.bEnd = document.getElementById('set-break-end').value;
                this.data.settings.lineName = document.getElementById('set-line-name').value;
                this.generateIntervals();
            },

            renderProductionList() {
                const container = document.getElementById('production-list'); container.innerHTML = ''; let total = 0;
                this.data.production.items.forEach((item, index) => {
                    if (item.isBreak) { 
                        container.innerHTML += `<div class="prod-row break-row"><span>${item.label}</span></div>`; 
                    } 
                    else {
                        total += Number(item.actual) || 0;
                        container.innerHTML += `
                            <div class="prod-row-container">
                                <div class="prod-row-flex">
                                    <span class="time-label">${item.label}</span>
                                    <input type="number" class="actual-input" pattern="\\d*" value="${item.actual}" oninput="App.updateActual(${index}, this.value)">
                                </div>
                                <input type="text" class="reason-input" placeholder="سبب العجز (إن وجد)..." value="${item.shortfallReason || ''}" oninput="App.updateHourlyReason(${index}, this.value)">
                            </div>
                        `;
                    }
                });
                document.getElementById('prod-total-calc').innerText = total; document.getElementById('home-total-prod').innerText = total;
            },

            updateActual(index, value) {
                this.data.production.items[index].actual = value; 
                this.saveState(); 
                let total = 0; this.data.production.items.forEach(item => { if(!item.isBreak) total += Number(item.actual) || 0; });
                document.getElementById('prod-total-calc').innerText = total; document.getElementById('home-total-prod').innerText = total;
            },

            updateHourlyReason(index, value) {
                this.data.production.items[index].shortfallReason = value;
                this.saveState();
            },

            addScratchDefect() {
                const type = document.getElementById('scratch-type').value;
                const notes = document.getElementById('scratch-notes').value;
                const fileInput = document.getElementById('scratch-image');
                
                if(!fileInput.files || !fileInput.files[0]) { this.showToast("برجاء التقاط صورة العيب أولاً"); return; }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64Img = e.target.result;
                    this.data.scratches.push({
                        id: Date.now(), type: type, notes: notes, image: base64Img, status: 'pending',
                        time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})
                    });
                    this.saveState(); this.renderScratchesList();
                    document.getElementById('scratch-notes').value = ''; fileInput.value = '';
                    this.showToast("تم الإدراج");
                };
                reader.readAsDataURL(fileInput.files[0]);
            },

            renderScratchesList() {
                const container = document.getElementById('scratches-list'); container.innerHTML = '';
                const sortedScratches = [...this.data.scratches].reverse();
                document.getElementById('scratches-counter').innerText = sortedScratches.length;

                if(sortedScratches.length === 0) {
                    container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding: 20px;">لا توجد عيوب مسجلة.</div>`;
                    return;
                }
                
                sortedScratches.forEach(defect => {
                    const isPending = defect.status === 'pending';
                    const statusClass = isPending ? 'status-pending' : 'status-fixed';
                    const statusText = isPending ? '⏳ قيد الإصلاح' : '✅ تم الإصلاح';
                    // استايل جديد يتوافق مع الدارك مود
                    container.innerHTML += `
                        <div class="glass-card" style="padding: 15px; margin-bottom: 12px; border-right: 4px solid ${isPending ? 'var(--accent-orange)' : 'var(--success)'}; border-radius: 12px;">
                            <div style="display: flex; gap: 15px;">
                                <img src="${defect.image}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 10px; border: 1px solid var(--glass-border);">
                                <div style="flex: 1;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
                                        <h4 style="color:var(--text-primary); font-size: 1rem;">${defect.type}</h4>
                                        <span class="eng-font" style="font-size: 0.7rem; color: var(--text-secondary);">${defect.time}</span>
                                    </div>
                                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">${defect.notes || 'لا توجد ملاحظات'}</p>
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <span style="font-size:0.75rem; padding: 4px 10px; border-radius: 15px; background: rgba(255,255,255,0.05); color: ${isPending ? 'var(--accent-orange)' : 'var(--success)'}; cursor:pointer;" onclick="App.toggleScratchStatus(${defect.id})">${statusText}</span>
                                        <i class="fa-solid fa-trash-can" style="color: #ff4b2b; cursor:pointer;" onclick="App.deleteScratch(${defect.id})"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            },

            toggleScratchStatus(id) {
                const index = this.data.scratches.findIndex(d => d.id === id);
                if(index > -1) {
                    this.data.scratches[index].status = this.data.scratches[index].status === 'pending' ? 'fixed' : 'pending';
                    this.saveState(); this.renderScratchesList();
                }
            },
            deleteScratch(id) {
                if(confirm("مسح السجل نهائياً؟")) {
                    this.data.scratches = this.data.scratches.filter(d => d.id !== id);
                    this.saveState(); this.renderScratchesList();
                }
            },

            saveState(skipAutoSave = false) {
                this.data.production.date = document.getElementById('prod-date').value;
                this.data.production.shift = document.getElementById('prod-shift').value;
                this.data.production.target = document.getElementById('prod-target').value;
                
                if (!this.data.history) this.data.history = {};
                const currentKey = `${this.data.production.date}_${this.data.production.shift}`;
                this.data.history[currentKey] = JSON.parse(JSON.stringify(this.data.production));

                localStorage.setItem('mes_core_data', JSON.stringify(this.data));

                if (!skipAutoSave) {
                    clearTimeout(this.syncTimer);
                    this.syncTimer = setTimeout(() => { this.syncToCloud(true); }, 3000);
                }
            },

            showToast(msg) {
                const toast = document.getElementById('toast'); toast.innerText = msg;
                toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000);
            },

            // =========================================
            // مولد تقرير الواتساب (تنسيق مطابق 100% للصورة)
            // =========================================
            sendWhatsAppReport() {
                let dParts = this.data.production.date.split('-'); 
                let formattedDate = `${dParts[2]}-${dParts[1]}-${dParts[0]}`; // DD-MM-YYYY
                let total = 0; 
                
                let report = `*تقرير انتاج ساعة بساعة*\n`;
                report += `${this.data.settings.lineName}\n`;
                report += `التاريخ: ${formattedDate}\n`;
                report += `الوردية : ${this.data.production.shift}\n\n`; // مسافة مزدوجة هنا
                
                this.data.production.items.forEach(item => {
                    if (item.isBreak) {
                        report += `\n*فترة راحة*\n\n`; // مسافة قبل وبعد الراحة
                    } else { 
                        let actVal = item.actual === "" ? "0" : item.actual; 
                        report += `${item.label} : ${actVal}\n`; 
                        
                        // إضافة العجز أسفل الساعة مباشرة بدون تنسيق إضافي (كما في الصورة)
                        if (item.shortfallReason && item.shortfallReason.trim() !== '') {
                            report += `${item.shortfallReason.trim()}\n`;
                        }
                        total += Number(item.actual) || 0; 
                    }
                });
                
                report += `\n*إجمالي الإنتاج : ${total}*`;
                
                const encodedText = encodeURIComponent(report); 
                window.open(`https://wa.me/?text=${encodedText}`, '_blank');
            },

            async syncToCloud(isSilent = false) {
                if(this.GOOGLE_API_URL === 'ضع_الرابط_هنا' || this.GOOGLE_API_URL === '') return;
                if (!isSilent) this.showToast("جاري المزامنة...");
                
                const payload = { type: "FULL_BACKUP", payload: this.data };
                try {
                    let response = await fetch(this.GOOGLE_API_URL, {
                        method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload)
                    });
                    let textResult = await response.text();
                    try {
                        let result = JSON.parse(textResult);
                        if(result.status === 'success') {
                            if (!isSilent) this.showToast("تم الحفظ ✅");
                        }
                    } catch(e) {}
                } catch(err) { if (!isSilent) this.showToast("خطأ شبكة ❌"); }
            },

            fetchFromCloud(isSilent = false) {
                if(this.GOOGLE_API_URL === 'ضع_الرابط_هنا' || this.GOOGLE_API_URL === '') return;
                if (!isSilent) this.showToast("جاري الاسترداد...");

                window.googleCloudCallback = (result) => {
                    const oldScript = document.getElementById('mes-sync-script'); if(oldScript) oldScript.remove();

                    if(result.status === 'success' && result.data) {
                        this.data = result.data;
                        if (!this.data.history) this.data.history = {};
                        this.saveState(true); 
                        
                        document.getElementById('set-shift-start').value = this.data.settings.start;
                        document.getElementById('set-shift-end').value = this.data.settings.end;
                        document.getElementById('set-break-start').value = this.data.settings.bStart;
                        document.getElementById('set-break-end').value = this.data.settings.bEnd;
                        document.getElementById('set-line-name').value = this.data.settings.lineName;
                        
                        this.updateProductionUI();
                        this.renderScratchesList();
                        
                        if (!isSilent) this.showToast("تم تحديث البيانات 🚀");
                    }
                };

                const script = document.createElement('script'); script.id = 'mes-sync-script';
                script.src = `${this.GOOGLE_API_URL}?callback=googleCloudCallback&t=${Date.now()}`;
                script.onerror = () => { if (!isSilent) this.showToast("انقطع الاتصال ❌"); script.remove(); };
                document.body.appendChild(script);
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
