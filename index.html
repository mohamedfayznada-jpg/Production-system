<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MES | Final Assembly & Packaging</title>
    <!-- خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <!-- أيقونات مجانية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- كود التصميم المدمج لضمان العمل 100% -->
    <style>
        /* =========================================
           الأساسيات والمتغيرات (Design Tokens)
        ========================================= */
        :root {
            --bg-dark: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.3);
            --success: #00ff87;
            --danger: #ff0844;
            --warning: #ffb199;
            --info: #4facfe;
            
            --radius-xl: 24px;
            --radius-lg: 16px;
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: calc(var(--nav-height) + 20px);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 8, 68, 0.05), transparent 25%);
        }

        .eng-font { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 1px; }
        .text-gradient { background: linear-gradient(135deg, var(--primary), var(--info)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* =========================================
           التأثيرات الزجاجية (Glassmorphism)
        ========================================= */
        .blur-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* =========================================
           شاشة الترحيب (Splash Screen)
        ========================================= */
        .splash-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .splash-icon { font-size: 5rem; color: var(--primary); margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--primary-glow)); animation: float 3s ease-in-out infinite; }
        .splash-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .splash-subtitle { color: var(--text-muted); font-size: 1.2rem; margin-top: 5px; font-weight: 700; letter-spacing: 2px;}
        .eng-badge { margin-top: 30px; padding: 8px 20px; background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 50px; font-weight: bold; color: var(--primary); }
        .loader-bar { width: 200px; height: 4px; background: var(--glass-border); border-radius: 4px; margin-top: 40px; overflow: hidden; }
        .loader-bar .progress { width: 0%; height: 100%; background: var(--primary); animation: loadBar 2s ease-in-out forwards; }

        /* =========================================
           الواجهة الرئيسية (Layout)
        ========================================= */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            padding: 20px; border-bottom-left-radius: var(--radius-xl); border-bottom-right-radius: var(--radius-xl);
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .dept-title { font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .icon-btn { background: transparent; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; }

        .content-area { padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* =========================================
           البطاقات (Cards & Dashboard)
        ========================================= */
        .hero-card {
            border-radius: var(--radius-xl); padding: 25px; text-align: center; margin-bottom: 25px;
            position: relative; overflow: hidden;
        }
        .hero-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0, 242, 254, 0.1) 0%, transparent 60%); z-index: -1; }
        .hero-card h2 { font-size: 1rem; color: var(--text-muted); font-weight: 700; }
        .hero-number { font-size: 4rem; background: linear-gradient(to bottom, #fff, #a0a0a5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin: 10px 0; }
        .hero-stats { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .stat { display: flex; flex-direction: column; gap: 5px; }
        .stat .label { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; }
        .stat .value { font-size: 1.2rem; }
        .value.success { color: var(--success); text-shadow: 0 0 10px rgba(0, 255, 135, 0.3); }
        .value.danger { color: var(--danger); text-shadow: 0 0 10px rgba(255, 8, 68, 0.3); }

        .section-title { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-card {
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; color: var(--text-main); cursor: pointer; transition: transform 0.2s;
        }
        .action-card:active { transform: scale(0.95); }
        .action-icon { font-size: 2rem; }
        .action-icon.success { color: var(--success); }
        .action-icon.danger { color: var(--danger); }
        .action-icon.warning { color: var(--warning); }
        .action-icon.info { color: var(--info); }
        .action-card span { font-weight: bold; font-size: 0.9rem; }

        /* =========================================
           شريط التنقل السفلي (Bottom Navigation)
        ========================================= */
        .bottom-nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: var(--nav-height);
            border-radius: var(--radius-xl); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); font-size: 0.75rem; font-weight: bold; transition: all 0.3s; cursor: pointer; }
        .nav-item i { font-size: 1.2rem; transition: transform 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 8px var(--primary-glow)); }

        /* الزر العائم (واتساب) */
        .special-nav .fab-btn {
            width: 60px; height: 60px; background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 1.8rem; margin-top: -30px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4);
            border: 4px solid var(--bg-dark); cursor: pointer; transition: transform 0.2s;
        }
        .special-nav .fab-btn:active { transform: scale(0.9); }

        /* =========================================
           الحركات (Animations)
        ========================================= */
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
        @keyframes loadBar { 0% { width: 0; } 100% { width: 100%; } }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- شاشة الترحيب الإبداعية -->
    <div id="splash-screen" class="splash-layer">
        <div class="logo-container">
            <i class="fa-solid fa-boxes-packing splash-icon" style="text-align: center; display: block;"></i>
            <h1 class="splash-title">MES CORE</h1>
            <p class="splash-subtitle" style="text-align: center;">Final Assembly</p>
            <div class="eng-badge">مدير الإنتاج | م.مُحَمَّد فَايِز</div>
        </div>
        <div class="loader-bar"><div class="progress"></div></div>
    </div>

    <!-- الرأس (Header) -->
    <header class="app-header blur-glass">
        <div class="header-content">
            <div class="dept-title">
                <i class="fa-solid fa-microchip text-gradient"></i>
                <span>التجميع النهائي والتغليف</span>
            </div>
            <button class="icon-btn"><i class="fa-solid fa-bell"></i></button>
        </div>
    </header>

    <!-- منطقة المحتوى الرئيسية -->
    <main class="content-area">
        
        <!-- شاشة لوحة التحكم (Home) -->
        <section id="screen-home" class="screen active fade-in-up">
            
            <div class="hero-card blur-glass">
                <h2>إنتاج اليوم</h2>
                <div class="hero-number eng-font">0</div>
                <div class="hero-stats">
                    <div class="stat"><span class="label">Yield الجودة</span><span class="value success eng-font">100%</span></div>
                    <div class="stat"><span class="label">الهالك (Scrap)</span><span class="value danger eng-font">0</span></div>
                </div>
            </div>

            <h3 class="section-title"><i class="fa-solid fa-bolt"></i> العمليات السريعة</h3>
            <div class="grid-actions">
                <button class="action-card blur-glass">
                    <i class="fa-solid fa-stopwatch action-icon success"></i>
                    <span>سجل الساعات</span>
                </button>
                <button class="action-card blur-glass">
                    <i class="fa-solid fa-shield-virus action-icon danger"></i>
                    <span>تسجيل عيب</span>
                </button>
                <button class="action-card blur-glass">
                    <i class="fa-solid fa-spray-can action-icon warning"></i>
                    <span>عيوب الرش</span>
                </button>
                <button class="action-card blur-glass">
                    <i class="fa-solid fa-chart-pie action-icon info"></i>
                    <span>التحليلات</span>
                </button>
            </div>

        </section>

    </main>

    <!-- شريط التنقل السفلي -->
    <nav class="bottom-nav blur-glass">
        <div class="nav-item active" data-target="home">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" data-target="production">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>الإنتاج</span>
        </div>
        <div class="nav-item special-nav">
            <div class="fab-btn">
                <i class="fa-brands fa-whatsapp"></i>
            </div>
        </div>
        <div class="nav-item" data-target="scratches">
            <i class="fa-solid fa-spray-can"></i>
            <span>الرش</span>
        </div>
        <div class="nav-item" data-target="analytics">
            <i class="fa-solid fa-chart-line"></i>
            <span>التحليل</span>
        </div>
    </nav>

    <script>
        // إزالة شاشة الترحيب بعد ثانيتين للبدء
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
            }, 500);
        }, 2500);
    </script>
</body>
</html>
