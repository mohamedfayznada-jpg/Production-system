<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MES | Final Assembly</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.3);
            --success: #00ff87;
            --danger: #ff0844;
            --warning: #ffb199;
            --info: #4facfe;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; padding-bottom: calc(var(--nav-height) + 20px); background-image: radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.05), transparent 25%), radial-gradient(circle at 85% 30%, rgba(255, 8, 68, 0.05), transparent 25%); }
        .eng-font { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 1px; }
        .text-gradient { background: linear-gradient(135deg, var(--primary), var(--info)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .blur-glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }

        .app-header { position: sticky; top: 0; z-index: 100; padding: 20px; border-bottom-left-radius: var(--radius-xl); border-bottom-right-radius: var(--radius-xl); }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .dept-title { font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 50%; color: var(--text-main); font-size: 1.2rem; cursor: pointer; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); background: var(--primary-glow); }

        .content-area { padding: 20px; }
        .screen { display: none; animation: fadeInUp 0.4s ease forwards; }
        .screen.active { display: block; }

        .hero-card { border-radius: var(--radius-xl); padding: 25px; text-align: center; margin-bottom: 25px; position: relative; overflow: hidden; }
        .hero-card h2 { font-size: 1rem; color: var(--text-muted); font-weight: 700; }
        .hero-number { font-size: 4rem; background: linear-gradient(to bottom, #fff, #a0a0a5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin: 10px 0; }
        
        .section-title { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-card { border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; color: var(--text-main); cursor: pointer; transition: transform 0.2s; }
        .action-card:active { transform: scale(0.95); }
        .action-icon { font-size: 2rem; }
        .action-icon.success { color: var(--success); }
        .action-icon.danger { color: var(--danger); }
        .action-icon.warning { color: var(--warning); }
        .action-icon.info { color: var(--info); }
        .action-card span { font-weight: bold; font-size: 0.9rem; }

        /* Form & Inputs */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: bold; }
        .glass-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 12px 15px; border-radius: var(--radius-lg); color: var(--text-main); font-family: 'Cairo'; font-size: 1rem; outline: none; transition: 0.3s; }
        .glass-input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .glass-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--info)); color: #000; border: none; padding: 15px; border-radius: var(--radius-lg); font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.2s; font-family: 'Cairo'; }
        .glass-btn:active { transform: scale(0.98); opacity: 0.8; }

        /* Production List */
        .prod-header { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .prod-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 10px 15px; border-radius: var(--radius-lg); margin-bottom: 10px; }
        .prod-row.break-row { background: rgba(255, 179, 153, 0.05); border-color: rgba(255, 179, 153, 0.2); justify-content: center; color: var(--warning); font-weight: bold; }
        .time-label { font-family: 'Orbitron'; color: var(--primary); font-weight: 700; font-size: 1.1rem; }
        .actual-input { width: 80px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-main); font-family: 'Orbitron'; font-size: 1.2rem; text-align: center; padding: 8px; outline: none; }
        .actual-input:focus { border-color: var(--success); }

        /* Defects Cards (Scratches) */
        .defect-card { display: flex; gap: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 15px; border-radius: var(--radius-lg); margin-bottom: 15px; transition: 0.3s; }
        .defect-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--bg-dark); }
        .defect-info { flex: 1; }
        .defect-info h4 { color: var(--danger); margin-bottom: 5px; font-size: 1.1rem; }
        .defect-status { margin-top: 10px; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: inline-block; transition: 0.2s; }
        .status-pending { background: rgba(255, 177, 153, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .status-fixed { background: rgba(0, 255, 135, 0.1); color: var(--success); border: 1px solid var(--success); }
        .defect-status:active { transform: scale(0.95); }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: var(--nav-height); border-radius: var(--radius-xl); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); font-size: 0.75rem; font-weight: bold; transition: all 0.3s; cursor: pointer; }
        .nav-item i { font-size: 1.2rem; transition: transform 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 8px var(--primary-glow)); }
        .special-nav .fab-btn { width: 60px; height: 60px; background: linear-gradient(135deg, #25D366, #128C7E); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.8rem; margin-top: -30px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4); border: 4px solid var(--bg-dark); cursor: pointer; transition: transform 0.2s; }
        .special-nav .fab-btn:active { transform: scale(0.9); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Toast Notification */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 10px 20px; border-radius: 30px; font-weight: bold; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 255, 135, 0.3); }
        #toast.show { opacity: 1; transform: translate(-50%, 10px); }
    </style>
</head>
<body>

    <header class="app-header blur-glass">
        <div class="header-content">
            <div class="dept-title">
                <i class="fa-solid fa-microchip text-gradient"></i>
                <span>التجميع النهائي والتغليف</span>
            </div>
            <button class="icon-btn" onclick="App.navigate('settings')"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <main class="content-area">
        
        <!-- ================= الشاشة الرئيسية ================= -->
        <section id="screen-home" class="screen active">
            <div class="hero-card blur-glass">
                <h2>إجمالي إنتاج اليوم</h2>
                <div class="hero-number eng-font" id="home-total-prod">0</div>
            </div>
            <h3 class="section-title"><i class="fa-solid fa-bolt"></i> العمليات السريعة</h3>
            <div class="grid-actions">
                <button class="action-card blur-glass" onclick="App.navigate('production')">
                    <i class="fa-solid fa-stopwatch action-icon success"></i>
                    <span>سجل الساعات</span>
                </button>
                <button class="action-card blur-glass" onclick="App.syncToCloud()">
                    <i class="fa-solid fa-cloud-arrow-up action-icon info"></i>
                    <span>مزامنة سحابية</span>
                </button>
                <button class="action-card blur-glass" onclick="App.navigate('scratches')">
                    <i class="fa-solid fa-spray-can action-icon warning"></i>
                    <span>عيوب الرش</span>
                </button>
            </div>
        </section>

        <!-- ================= شاشة الإنتاج ================= -->
        <section id="screen-production" class="screen">
            <h3 class="section-title"><i class="fa-solid fa-clipboard-list text-gradient"></i> سجل الإنتاج اللحظي</h3>
            
            <div class="prod-header">
                <div class="input-group">
                    <label>تاريخ اليوم</label>
                    <input type="date" id="prod-date" class="glass-input" onchange="App.saveState()">
                </div>
                <div class="input-group">
                    <label>الوردية</label>
                    <select id="prod-shift" class="glass-input" onchange="App.saveState()">
                        <option value="1">الوردية الأولى (1)</option>
                        <option value="2">الوردية الثانية (2)</option>
                        <option value="3">الوردية الثالثة (3)</option>
                    </select>
                </div>
            </div>

            <div class="blur-glass" style="border-radius: var(--radius-xl); padding: 15px; margin-bottom: 20px;">
                <div id="production-list"></div>
                <div style="text-align: left; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
                    <span style="color: var(--text-muted); font-weight: bold; font-size: 0.9rem;">الإجمالي: </span>
                    <span id="prod-total-calc" class="eng-font" style="font-size: 1.5rem; color: var(--primary);">0</span>
                </div>
            </div>
        </section>

        <!-- ================= شاشة عيوب الرش ================= -->
        <section id="screen-scratches" class="screen">
            <h3 class="section-title"><i class="fa-solid fa-spray-can text-gradient"></i> سجل عيوب الرش الظاهرية</h3>
            
            <!-- نموذج إضافة عيب -->
            <div class="blur-glass" style="border-radius: var(--radius-xl); padding: 20px; margin-bottom: 25px;">
                <div class="input-group">
                    <label>نوع العيب</label>
                    <select id="scratch-type" class="glass-input">
                        <option value="خدش خفيف">خدش خفيف</option>
                        <option value="خدش عميق">خدش عميق</option>
                        <option value="خبطة">خبطة</option>
                        <option value="تسييل لون">تسييل لون</option>
                        <option value="رايش">رايش</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>إرفاق صورة العيب (من الكاميرا)</label>
                    <input type="file" id="scratch-image" accept="image/*" capture="environment" class="glass-input" style="padding: 9px; background: rgba(0,242,254,0.1); border-color: rgba(0,242,254,0.3);">
                </div>
                <div class="input-group">
                    <label>ملاحظات (اختياري)</label>
                    <input type="text" id="scratch-notes" class="glass-input" placeholder="مثال: يمين الباب السفلي...">
                </div>
                <button class="glass-btn" onclick="App.addScratchDefect()">
                    <i class="fa-solid fa-plus"></i> تسجيل العيب في السجل
                </button>
            </div>

            <!-- قائمة العيوب -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h4 style="color:var(--text-muted);"><i class="fa-solid fa-list-check"></i> العيوب المسجلة اليوم</h4>
                <span class="eng-font" id="scratches-counter" style="color:var(--warning); font-size:1.2rem;">0</span>
            </div>
            <div id="scratches-list">
                <!-- سيتم توليد البطاقات هنا -->
            </div>
        </section>

        <!-- ================= شاشة الإعدادات ================= -->
        <section id="screen-settings" class="screen">
            <h3 class="section-title"><i class="fa-solid fa-sliders text-gradient"></i> مهندس الوردية (الجدولة)</h3>
            <div class="blur-glass" style="border-radius: var(--radius-xl); padding: 20px;">
                <div class="input-group">
                    <label>بداية الوردية</label>
                    <input type="time" id="set-shift-start" class="glass-input" value="07:30">
                </div>
                <div class="input-group">
                    <label>نهاية الوردية</label>
                    <input type="time" id="set-shift-end" class="glass-input" value="16:00">
                </div>
                <div class="input-group">
                    <label>بداية الراحة</label>
                    <input type="time" id="set-break-start" class="glass-input" value="12:30">
                </div>
                <div class="input-group">
                    <label>نهاية الراحة</label>
                    <input type="time" id="set-break-end" class="glass-input" value="13:30">
                </div>
                <div class="input-group" style="margin-top: 25px;">
                    <label>المنتج الحالي (Line Name)</label>
                    <input type="text" id="set-line-name" class="glass-input" value="الثلاجة A | Final Assembly">
                </div>
                
                <button class="glass-btn" onclick="App.applySettings()">
                    <i class="fa-solid fa-check-double"></i> اعتماد وتوليد الساعات
                </button>
            </div>
        </section>

    </main>

    <nav class="bottom-nav blur-glass">
        <div class="nav-item active" data-target="home" onclick="App.navigate('home')">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" data-target="production" onclick="App.navigate('production')">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>الإنتاج</span>
        </div>
        <div class="nav-item special-nav" onclick="App.sendWhatsAppReport()">
            <div class="fab-btn"><i class="fa-brands fa-whatsapp"></i></div>
        </div>
        <div class="nav-item" data-target="scratches" onclick="App.navigate('scratches')">
            <i class="fa-solid fa-spray-can"></i>
            <span>الرش</span>
        </div>
        <div class="nav-item" data-target="analytics" onclick="App.navigate('analytics')">
            <i class="fa-solid fa-chart-line"></i>
            <span>التحليل</span>
        </div>
    </nav>

    <div id="toast">تم الحفظ بنجاح</div>

    <script>
 const App = {
            // ==========================================
            // تم وضع الرابط في مكانه الصحيح هنا:
            // ==========================================
            GOOGLE_API_URL: 'https://script.google.com/macros/s/AKfycbwHY23p34VnHGXVzbfqe6KgMkHWyZouu3VIoLtbkbtetnFYGpI7QRoGRmI0sJ3DNQND/exec', 

            data: {
                settings: { start: '07:30', end: '16:00', bStart: '12:30', bEnd: '14:30', lineName: 'الثلاجة A | Final Assembly' },                production: { date: '', shift: '1', items: [] },
                scratches: []
            },

            init() {
                const saved = localStorage.getItem('mes_core_data');
                if (saved) {
                    this.data = { ...this.data, ...JSON.parse(saved) };
                    if(!this.data.scratches) this.data.scratches = [];
                } else {
                    this.data.production.date = new Date().toISOString().split('T')[0];
                }

                document.getElementById('set-shift-start').value = this.data.settings.start;
                document.getElementById('set-shift-end').value = this.data.settings.end;
                document.getElementById('set-break-start').value = this.data.settings.bStart;
                document.getElementById('set-break-end').value = this.data.settings.bEnd;
                document.getElementById('set-line-name').value = this.data.settings.lineName;
                document.getElementById('prod-date').value = this.data.production.date;
                document.getElementById('prod-shift').value = this.data.production.shift;

                if (this.data.production.items.length === 0) {
                    this.generateIntervals();
                } else {
                    this.renderProductionList();
                }

                this.renderScratchesList();
            },

            navigate(screenId) {
                if(screenId === 'analytics') { this.showToast("سيتم تفعيل شاشة التحليلات قريباً"); return; }
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                const targetScreen = document.getElementById('screen-' + screenId);
                if(targetScreen) targetScreen.classList.add('active');

                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navBtn = document.querySelector(`.nav-item[data-target="${screenId}"]`);
                if(navBtn) navBtn.classList.add('active');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            formatAMPM(timeStr) {
                let [hours, minutes] = timeStr.split(':');
                hours = parseInt(hours);
                let ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12; hours = hours ? hours : 12; 
                let hoursStr = hours < 10 ? '0' + hours : hours;
                return `${hoursStr}:${minutes} ${ampm}`;
            },

            addMinutes(timeStr, minsToAdd) {
                let [h, m] = timeStr.split(':').map(Number);
                let date = new Date(); date.setHours(h, m, 0);
                date.setMinutes(date.getMinutes() + minsToAdd);
                return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            },

            timeToMins(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; },

            generateIntervals() {
                const { start, end, bStart, bEnd } = this.data.settings;
                let current = start; let intervals = [];
                let endMins = this.timeToMins(end);
                if (endMins <= this.timeToMins(start)) endMins += 24 * 60;

                while (this.timeToMins(current) < endMins) {
                    if (current === bStart) { intervals.push({ isBreak: true, label: "فترة راحة" }); current = bEnd; continue; }
                    let nextHour = this.addMinutes(current, 60);
                    if (this.timeToMins(nextHour) > this.timeToMins(bStart) && this.timeToMins(current) < this.timeToMins(bStart)) nextHour = bStart;
                    if (this.timeToMins(nextHour) > endMins) nextHour = end;
                    intervals.push({ isBreak: false, label: this.formatAMPM(nextHour), rawTime: nextHour, actual: "" });
                    current = nextHour;
                }

                this.data.production.items = intervals;
                this.saveState(); this.renderProductionList();
                this.showToast("تم توليد سجل الساعات بنجاح"); this.navigate('production');
            },

            applySettings() {
                this.data.settings.start = document.getElementById('set-shift-start').value;
                this.data.settings.end = document.getElementById('set-shift-end').value;
                this.data.settings.bStart = document.getElementById('set-break-start').value;
                this.data.settings.bEnd = document.getElementById('set-break-end').value;
                this.data.settings.lineName = document.getElementById('set-line-name').value;
                this.generateIntervals();
            },

            renderProductionList() {
                const container = document.getElementById('production-list'); container.innerHTML = ''; let total = 0;
                this.data.production.items.forEach((item, index) => {
                    if (item.isBreak) { container.innerHTML += `<div class="prod-row break-row"><i class="fa-solid fa-mug-hot" style="margin-left: 8px;"></i> ${item.label}</div>`; } 
                    else {
                        total += Number(item.actual) || 0;
                        container.innerHTML += `<div class="prod-row"><span class="time-label">${item.label}</span><input type="number" class="actual-input" pattern="\\d*" value="${item.actual}" oninput="App.updateActual(${index}, this.value)"></div>`;
                    }
                });
                document.getElementById('prod-total-calc').innerText = total; document.getElementById('home-total-prod').innerText = total;
            },

            updateActual(index, value) {
                this.data.production.items[index].actual = value; this.saveState();
                let total = 0; this.data.production.items.forEach(item => { if(!item.isBreak) total += Number(item.actual) || 0; });
                document.getElementById('prod-total-calc').innerText = total; document.getElementById('home-total-prod').innerText = total;
            },

            addScratchDefect() {
                const type = document.getElementById('scratch-type').value;
                const notes = document.getElementById('scratch-notes').value;
                const fileInput = document.getElementById('scratch-image');
                
                if(!fileInput.files || !fileInput.files[0]) {
                    this.showToast("برجاء التقاط صورة العيب أولاً"); return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64Img = e.target.result;
                    this.data.scratches.push({
                        id: Date.now(),
                        type: type,
                        notes: notes,
                        image: base64Img,
                        status: 'pending',
                        time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})
                    });
                    this.saveState();
                    this.renderScratchesList();
                    
                    document.getElementById('scratch-notes').value = '';
                    fileInput.value = '';
                    this.showToast("تم إدراج العيب محلياً");
                };
                reader.readAsDataURL(fileInput.files[0]);
            },

            renderScratchesList() {
                const container = document.getElementById('scratches-list');
                container.innerHTML = '';
                const sortedScratches = [...this.data.scratches].reverse();
                document.getElementById('scratches-counter').innerText = sortedScratches.length;

                if(sortedScratches.length === 0) {
                    container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding: 20px;">لا توجد عيوب مسجلة اليوم.</div>`;
                    return;
                }
                
                sortedScratches.forEach(defect => {
                    const isPending = defect.status === 'pending';
                    const statusClass = isPending ? 'status-pending' : 'status-fixed';
                    const statusText = isPending ? '⏳ قيد الإصلاح' : '✅ تم الإصلاح';
                    
                    container.innerHTML += `
                        <div class="defect-card" style="border-right: 4px solid ${isPending ? 'var(--warning)' : 'var(--success)'};">
                            <img src="${defect.image}" class="defect-img">
                            <div class="defect-info">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <h4>${defect.type}</h4>
                                    <span style="font-size: 0.75rem; color: var(--text-muted); font-family:'Orbitron';">${defect.time}</span>
                                </div>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">${defect.notes || 'لا توجد ملاحظات إضافية'}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div class="defect-status ${statusClass}" onclick="App.toggleScratchStatus(${defect.id})">
                                        ${statusText}
                                    </div>
                                    <i class="fa-solid fa-trash-can" style="color: var(--danger); padding:8px; cursor:pointer;" onclick="App.deleteScratch(${defect.id})"></i>
                                </div>
                            </div>
                        </div>
                    `;
                });
            },

            toggleScratchStatus(id) {
                const index = this.data.scratches.findIndex(d => d.id === id);
                if(index > -1) {
                    this.data.scratches[index].status = this.data.scratches[index].status === 'pending' ? 'fixed' : 'pending';
                    this.saveState(); this.renderScratchesList();
                }
            },
            
            deleteScratch(id) {
                if(confirm("مسح السجل نهائياً؟")) {
                    this.data.scratches = this.data.scratches.filter(d => d.id !== id);
                    this.saveState(); this.renderScratchesList();
                }
            },

            saveState() {
                this.data.production.date = document.getElementById('prod-date').value;
                this.data.production.shift = document.getElementById('prod-shift').value;
                localStorage.setItem('mes_core_data', JSON.stringify(this.data));
            },

            showToast(msg) {
                const toast = document.getElementById('toast'); toast.innerText = msg;
                toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000);
            },

            sendWhatsAppReport() {
                let dParts = this.data.production.date.split('-'); let formattedDate = `${dParts[2]}-${dParts[1]}-${dParts[0]}`;
                let total = 0; let report = `*تقرير انتاج ساعة بساعة*\n${this.data.settings.lineName}\nالتاريخ: ${formattedDate}\nالوردية: ${this.data.production.shift}\n\n`;
                this.data.production.items.forEach(item => {
                    if (item.isBreak) report += `\n*${item.label}*\n\n`;
                    else { let actVal = item.actual === "" ? "0" : item.actual; report += `${item.label} : ${actVal}\n`; total += Number(item.actual) || 0; }
                });
                report += `\n*إجمالي الإنتاج : ${total}*`;
                const encodedText = encodeURIComponent(report); window.open(`https://wa.me/?text=${encodedText}`, '_blank');
            },

         // =========================================
            // دالة المزامنة السحابية الجديدة (Cloud Sync)
            // =========================================
            syncToCloud() {
                // تم إرجاع الشرط لأصله ليتحقق من عدم وجود الرابط الافتراضي
                if(this.GOOGLE_API_URL === 'ضع_الرابط_هنا' || this.GOOGLE_API_URL === '') {
                    this.showToast("يرجى إعداد رابط Google Drive أولاً");
                    return;
                }

                this.showToast("جاري المزامنة مع السحابة ☁️...");
                // إعداد حزمة البيانات للإرسال
                const payload = {
                    type: "FULL_BACKUP",
                    payload: this.data
                };

                // إرسال البيانات (باستخدام no-cors لضمان العبور السريع وعدم حظر المتصفح)
                fetch(this.GOOGLE_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                }).then(() => {
                    // في وضع no-cors، المتصفح يعتبر الاتصال ناجحاً إذا تم الإرسال
                    this.showToast("تم النسخ الاحتياطي في Google Drive ✅");
                }).catch(err => {
                    console.error(err);
                    this.showToast("حدث خطأ في الاتصال بالإنترنت ❌");
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
        // دالة جديدة لإرسال أحدث بيانات من الشيت إلى التطبيق (للموبايل)
function doGet(e) {
  try {
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Data");
    var lastRow = sheet.getLastRow();
    
    // التأكد من وجود بيانات
    if (lastRow <= 0) {
      return ContentService.createTextOutput(JSON.stringify({"status": "empty"}))
        .setMimeType(ContentService.MimeType.JSON);
    }
    
    // جلب البيانات من العمود الثالث (C) في آخر صف
    var lastPayload = sheet.getRange(lastRow, 3).getValue();
    
    // إرسال البيانات للتطبيق
    return ContentService.createTextOutput(JSON.stringify({
      "status": "success", 
      "data": JSON.parse(lastPayload)
    })).setMimeType(ContentService.MimeType.JSON);
    
  } catch(error) {
    return ContentService.createTextOutput(JSON.stringify({"status": "error", "message": error.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}
    </script>
</body>
